<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>💖 Mom & Dad's Eternal Love | Anniversary Celebration 💖</title>
  <!-- Google Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #fff5ec 0%, #ffe8dc 100%);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Main Container */
    .main-container {
      max-width: 950px;
      margin: 0 auto;
      padding: 30px 20px 80px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* Premium Card */
    .celebration-card {
      background: rgba(255, 252, 245, 0.96);
      backdrop-filter: blur(8px);
      border-radius: 80px;
      padding: 40px 35px;
      box-shadow: 0 35px 65px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255,255,240,0.9);
      border: 1px solid rgba(245, 205, 155, 0.6);
      text-align: center;
      width: 100%;
      transition: all 0.3s;
    }

    .gold-divider {
      width: 100px;
      height: 4px;
      background: linear-gradient(90deg, #e4b363, #f7d97e, #e4b363);
      margin: 15px auto 20px;
      border-radius: 4px;
    }

    .parents-name {
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #b4692c, #e6b04e, #c2823a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 2px;
    }

    .anniversary-badge {
      display: inline-block;
      background: #fff0e0;
      padding: 8px 22px;
      border-radius: 100px;
      font-size: 0.95rem;
      font-weight: 600;
      color: #bc7a3e;
      margin-top: 12px;
      box-shadow: inset 0 0 0 1px #f7e1c1;
    }

    /* Cake & Candle Arena */
    .cake-arena {
      margin: 30px 0 20px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .cake-wrapper {
      position: relative;
      display: inline-block;
      cursor: pointer;
      filter: drop-shadow(0 20px 25px rgba(0, 0, 0, 0.2));
    }

    /* Cake Layers */
    .cake-layer-bottom {
      background: linear-gradient(145deg, #dc9e6b, #c48148);
      height: 75px;
      width: 280px;
      border-radius: 22px 22px 18px 18px;
      box-shadow: 0 8px 0 #9b5a2c;
      position: relative;
    }
    .cake-layer-middle {
      background: linear-gradient(145deg, #f2c49b, #e8b27a);
      height: 65px;
      width: 250px;
      border-radius: 20px 20px 16px 16px;
      margin: -8px auto 0;
      box-shadow: 0 6px 0 #c47e46;
    }
    .cake-layer-top {
      background: linear-gradient(145deg, #f9e0b0, #f5d29c);
      height: 60px;
      width: 220px;
      border-radius: 20px 20px 16px 16px;
      margin: -8px auto 0;
      box-shadow: 0 5px 0 #d49c5c;
      position: relative;
    }
    .icing {
      position: absolute;
      top: -14px;
      left: 0;
      width: 100%;
      height: 28px;
      background: #fff9ef;
      border-radius: 50px 50px 30px 30px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    /* Candles Container */
    .candles-container {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-top: -32px;
      margin-bottom: 20px;
      position: relative;
      z-index: 10;
    }

    .candle {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .candle:hover {
      transform: translateY(-3px);
    }
    .candle-stick {
      width: 22px;
      height: 68px;
      background: linear-gradient(145deg, #f5b7a8, #e6855a);
      border-radius: 12px 12px 6px 6px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.15);
      position: relative;
    }
    .flame {
      width: 22px;
      height: 34px;
      background: radial-gradient(circle, #ffb347, #ff6b3d);
      border-radius: 50% 50% 35% 35%;
      position: relative;
      top: -32px;
      left: 0;
      filter: blur(0.8px);
      animation: flickerWarm 1s infinite alternate;
      box-shadow: 0 0 18px #ff9f4a;
      cursor: pointer;
      transition: all 0.2s;
    }
    @keyframes flickerWarm {
      0% { transform: scale(1); opacity: 0.95; box-shadow: 0 0 10px #ffa500; }
      100% { transform: scale(1.08, 1.03); opacity: 1; box-shadow: 0 0 22px #ff7b2c; }
    }
    .candle.extinguished .flame {
      opacity: 0;
      transform: scale(0.1);
      animation: none;
      background: #b0a088;
      box-shadow: none;
      transition: all 0.3s ease;
    }

    /* Blowing Effect Animation */
    @keyframes blowParticles {
      0% { transform: translate(0, 0) scale(1); opacity: 0.8; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
    }
    .blow-particle {
      position: fixed;
      pointer-events: none;
      font-size: 1.2rem;
      z-index: 10000;
      animation: blowParticles 0.6s ease-out forwards;
    }

    /* Action Buttons */
    .action-buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 20px 0 15px;
    }
    .btn-luxury {
      background: linear-gradient(120deg, #e6b27a, #d49048);
      border: none;
      padding: 14px 32px;
      font-weight: 700;
      color: white;
      border-radius: 60px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 8px 18px rgba(0,0,0,0.15);
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-family: 'Poppins', sans-serif;
    }
    .btn-luxury:active {
      transform: scale(0.96);
    }
    .btn-secondary {
      background: linear-gradient(120deg, #c9a87c, #b87a4b);
    }

    /* Message Area */
    .message-area {
      background: #fff3e8;
      border-radius: 60px;
      padding: 14px 24px;
      margin: 20px 0 15px;
      font-weight: 500;
      color: #b1652c;
      text-align: center;
      min-height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* Slice Presentation Modal */
    .slice-presentation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: auto;
      z-index: 10000;
      display: flex;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(8px);
      background: rgba(0,0,0,0.5);
      animation: fadeOverlay 0.3s ease;
    }
    @keyframes fadeOverlay {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .slice-card {
      background: linear-gradient(145deg, #fff5e8, #ffefdf);
      border-radius: 70px;
      padding: 35px 40px;
      text-align: center;
      box-shadow: 0 35px 55px rgba(0,0,0,0.3);
      animation: popIn 0.5s cubic-bezier(0.34, 1.2, 0.64, 1);
      border: 2px solid #f7d9aa;
      max-width: 450px;
      position: relative;
    }
    @keyframes popIn {
      0% { transform: scale(0.7); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .slice-card i {
      font-size: 4rem;
      color: #d48f4b;
      margin-bottom: 15px;
    }
    .slice-card h3 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: #b45f2b;
    }
    .slice-plate {
      display: flex;
      gap: 40px;
      justify-content: center;
      margin: 25px 0;
      flex-wrap: wrap;
    }
    .slice {
      background: #f9dbb0;
      padding: 20px 20px;
      border-radius: 45px;
      min-width: 130px;
      box-shadow: 0 8px 12px rgba(0,0,0,0.1);
      transition: transform 0.3s;
    }
    .slice:hover {
      transform: scale(1.05);
    }
    .slice i {
      font-size: 2.8rem;
      margin-bottom: 8px;
      color: #c2823a;
    }
    .modal-buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-top: 20px;
    }
    .modal-btn {
      background: #e6b27a;
      border: none;
      padding: 10px 28px;
      border-radius: 50px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }
    .modal-btn.back-btn {
      background: #b87a4b;
    }
    .modal-btn:hover {
      transform: scale(1.05);
    }

    /* Games Section */
    .games-section {
      margin-top: 35px;
      padding-top: 20px;
      border-top: 2px dashed #f3cfaa;
    }
    .games-title {
      font-family: 'Playfair Display', serif;
      color: #b45f2b;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .game-container {
      display: flex;
      gap: 25px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .game-card {
      background: rgba(255, 245, 235, 0.9);
      border-radius: 50px;
      padding: 20px;
      flex: 1;
      min-width: 220px;
      cursor: pointer;
      transition: all 0.3s;
      border: 1px solid #f7dcb5;
    }
    .game-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 25px rgba(0,0,0,0.1);
    }
    .game-card i {
      font-size: 2.5rem;
      color: #e6a157;
      margin-bottom: 12px;
    }
    .game-card h4 {
      color: #b45f2b;
      margin-bottom: 8px;
    }
    .game-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(5px);
      z-index: 10001;
      display: flex;
      justify-content: center;
      align-items: center;
      animation: fadeOverlay 0.2s;
    }
    .game-content {
      background: #fffaf2;
      border-radius: 60px;
      padding: 30px;
      max-width: 500px;
      width: 90%;
      text-align: center;
      animation: popIn 0.3s;
    }
    .close-game {
      margin-top: 20px;
      background: #e6b27a;
      border: none;
      padding: 10px 25px;
      border-radius: 40px;
      cursor: pointer;
    }
    .love-meter {
      font-size: 2rem;
      margin: 20px;
    }
    .fortune-text {
      font-size: 1.3rem;
      margin: 20px;
      font-family: 'Playfair Display', serif;
      color: #b45f2b;
    }

    /* Blow Hint */
    .blow-hint {
      font-size: 0.85rem;
      background: rgba(0,0,0,0.04);
      padding: 8px 18px;
      border-radius: 50px;
      display: inline-block;
      margin: 10px auto;
      color: #a5682e;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
    }

    /* Floating Hearts */
    .floating-hearts {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }
    .heart-float {
      position: absolute;
      font-size: 1.3rem;
      animation: floatHeart 12s linear forwards;
      color: #ffb7c5;
    }
    @keyframes floatHeart {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0.7; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    /* Knife Cinematic Animation */
    .knife-cinematic {
      position: absolute;
      font-size: 4rem;
      pointer-events: none;
      z-index: 200;
      filter: drop-shadow(0 0 8px gold);
      animation: knifeSlowCut 1.2s ease-in-out forwards;
    }
    @keyframes knifeSlowCut {
      0% { transform: translateX(-100px) translateY(-30px) rotate(-60deg); opacity: 0; }
      20% { opacity: 1; transform: translateX(-30px) translateY(-20px) rotate(-45deg); }
      50% { transform: translateX(60px) translateY(10px) rotate(-10deg); }
      80% { transform: translateX(130px) translateY(30px) rotate(15deg); opacity: 1; }
      100% { transform: translateX(180px) translateY(45px) rotate(25deg); opacity: 0; }
    }

    #confettiCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
    }

    footer {
      text-align: center;
      font-size: 0.75rem;
      margin-top: 25px;
      opacity: 0.7;
      color: #b87a4b;
    }

    @media (max-width: 600px) {
      .celebration-card { padding: 25px 18px; }
      .parents-name { font-size: 2rem; }
      .cake-layer-bottom { width: 220px; height: 60px; }
      .cake-layer-middle { width: 195px; }
      .cake-layer-top { width: 170px; }
      .candles-container { gap: 18px; }
    }
  </style>
</head>
<body>

<div class="floating-hearts" id="heartsContainer"></div>
<canvas id="confettiCanvas"></canvas>

<div class="main-container">
  <div class="celebration-card">
    <i class="fas fa-heart" style="font-size: 2.8rem; color: #e6a66b; opacity: 0.8;"></i>
    <div class="parents-name">💕 Mom & Dad 💕</div>
    <div class="anniversary-badge"><i class="fas fa-infinity"></i> Forever Together · Anniversary Bliss <i class="fas fa-cake-candles"></i></div>
    <div class="gold-divider"></div>

    <!-- Cake & Candle Zone -->
    <div class="cake-arena">
      <div class="cake-wrapper" id="cakeWrapper">
        <div class="cake-layer-bottom"><div class="icing"></div></div>
        <div class="cake-layer-middle"></div>
        <div class="cake-layer-top"><div class="icing"></div></div>
      </div>
      <div class="candles-container" id="candlesContainer"></div>
    </div>

    <div class="action-buttons">
      <button class="btn-luxury" id="blowCandlesBtn"><i class="fas fa-wind"></i> Blow Candles</button>
      <button class="btn-luxury" id="cutCakeBtn"><i class="fas fa-utensil-spoon"></i> Cut the Cake 🍰</button>
    </div>

    <div class="message-area" id="messageArea">
      <i class="fas fa-heart" style="color: #e6a157;"></i> Welcome Mom & Dad! Let's celebrate! <i class="fas fa-heart" style="color: #e6a157;"></i>
    </div>

    <div class="blow-hint" id="micHint">
      <i class="fas fa-microphone-alt"></i> 🎤 Click & allow mic — blow into phone to extinguish candles!
    </div>

    <!-- Games Section -->
    <div class="games-section">
      <div class="games-title">
        <i class="fas fa-gamepad"></i>
        <h3>Playful Moments</h3>
        <i class="fas fa-smile"></i>
      </div>
      <div class="game-container">
        <div class="game-card" id="loveMeterGame">
          <i class="fas fa-heartbeat"></i>
          <h4>Love Meter</h4>
          <p>Tap to measure infinite love!</p>
        </div>
        <div class="game-card" id="fortuneCookie">
          <i class="fas fa-cookie-bite"></i>
          <h4>Love Fortune</h4>
          <p>Sweet messages of love</p>
        </div>
      </div>
    </div>
    <footer>Celebrating your beautiful journey together ❤️</footer>
  </div>
</div>

<script>
  // Confetti System
  const canvas = document.getElementById('confettiCanvas');
  let ctx = canvas.getContext('2d');
  let width = window.innerWidth, height = window.innerHeight;
  let particles = [];
  let animActive = false;

  function resizeCanvas() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  function triggerConfetti(intensity = 35) {
    let count = Math.min(90, intensity + 20);
    for(let i = 0; i < count; i++) {
      particles.push({
        x: width/2 + (Math.random() - 0.5) * 200,
        y: height/2 - 80,
        size: 6 + Math.random() * 12,
        speedX: (Math.random() - 0.5) * 8,
        speedY: -Math.random() * 12 - 5,
        color: `hsl(${Math.random() * 360}, 75%, 65%)`,
        life: 1,
        rotation: Math.random() * 360,
        rotSpeed: (Math.random() - 0.5) * 0.2
      });
    }
    if(!animActive) animateConfetti();
  }

  function animateConfetti() {
    if(particles.length === 0) { animActive = false; ctx.clearRect(0,0,width,height); return; }
    animActive = true;
    ctx.clearRect(0,0,width,height);
    for(let i=0;i<particles.length;i++) {
      let p = particles[i];
      p.x += p.speedX;
      p.y += p.speedY;
      p.speedY += 0.2;
      p.life -= 0.012;
      p.rotation += p.rotSpeed;
      if(p.y > height + 70 || p.x < -70 || p.x > width+70 || p.life <= 0) {
        particles.splice(i,1);
        i--;
        continue;
      }
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation * Math.PI/180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
      ctx.restore();
    }
    requestAnimationFrame(animateConfetti);
  }

  function playSweetSound() {
    try {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = 720;
      gain.gain.value = 0.12;
      osc.type = 'sine';
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.35);
      osc.stop(audioCtx.currentTime + 0.3);
    } catch(e) {}
  }

  // Blowing Effect Particles
  function createBlowEffect(x, y) {
    for(let i=0;i<18;i++) {
      const particle = document.createElement('div');
      particle.className = 'blow-particle';
      particle.innerHTML = ['💨','✨','💨','🌬️','💨','⭐'][Math.floor(Math.random()*6)];
      particle.style.left = (x + (Math.random() - 0.5) * 60) + 'px';
      particle.style.top = (y + (Math.random() - 0.5) * 40) + 'px';
      const tx = (Math.random() - 0.5) * 150;
      const ty = -Math.random() * 120 - 30;
      particle.style.setProperty('--tx', tx + 'px');
      particle.style.setProperty('--ty', ty + 'px');
      document.body.appendChild(particle);
      setTimeout(() => particle.remove(), 600);
    }
  }

  // Candles Logic
  let candlesLit = true;
  let candleElements = [];
  const candlesContainer = document.getElementById('candlesContainer');
  const messageArea = document.getElementById('messageArea');

  function createCandles() {
    candlesContainer.innerHTML = '';
    candleElements = [];
    for(let i=0; i<3; i++) {
      const candleDiv = document.createElement('div');
      candleDiv.classList.add('candle');
      const stick = document.createElement('div');
      stick.classList.add('candle-stick');
      const flame = document.createElement('div');
      flame.classList.add('flame');
      stick.appendChild(flame);
      candleDiv.appendChild(stick);
      candleDiv.addEventListener('click', (e) => {
        e.stopPropagation();
        if(!candlesLit) return;
        const rect = candleDiv.getBoundingClientRect();
        createBlowEffect(rect.left + rect.width/2, rect.top + 30);
        if(!candleDiv.classList.contains('extinguished')) {
          candleDiv.classList.add('extinguished');
          playSweetSound();
          triggerConfetti(10);
          checkAllCandlesOut();
          messageArea.innerHTML = "🌬️ One candle blown! Keep going! 🕯️";
          setTimeout(() => updateMessageNeutral(), 1500);
        }
      });
      candlesContainer.appendChild(candleDiv);
      candleElements.push(candleDiv);
    }
  }

  function checkAllCandlesOut() {
    const allOut = candleElements.every(c => c.classList.contains('extinguished'));
    if(allOut && candlesLit === true) {
      candlesLit = false;
      triggerConfetti(55);
      messageArea.innerHTML = "✨🕯️ MAGICAL! All candles blown! Make a wish, Mom & Dad! Your love shines brighter than ever! 🕯️✨";
      playSweetSound();
      setTimeout(() => {
        if(!cakeCut) messageArea.innerHTML = "💖 Wishes sent! Now cut the beautiful cake! 💖";
        else messageArea.innerHTML = "💖 Such a magical celebration! 💖";
      }, 3000);
    }
  }

  function blowAllCandles() {
    if(!candlesLit) return;
    const centerX = window.innerWidth/2;
    const centerY = window.innerHeight/2 - 100;
    createBlowEffect(centerX, centerY);
    let anyChanged = false;
    candleElements.forEach(c => {
      if(!c.classList.contains('extinguished')) {
        c.classList.add('extinguished');
        anyChanged = true;
      }
    });
    if(anyChanged) {
      candlesLit = false;
      triggerConfetti(65);
      messageArea.innerHTML = "🌬️💨 Whoosh! A loving breeze blew all candles! Happy Anniversary! 💨🌬️";
      playSweetSound();
      setTimeout(() => {
        if(!cakeCut) messageArea.innerHTML = "🎂 Your wish is ready! Time to cut the cake! 🎂";
        else messageArea.innerHTML = "💕 Forever in love! What a magical moment! 💕";
      }, 2800);
    }
  }

  function updateMessageNeutral() {
    if(!cakeCut && candlesLit) messageArea.innerHTML = "❤️ Tap candles or blow into mic! Then cut the cake! ❤️";
  }

  // Cake Cutting with Cinematic Slow Animation
  let cakeCut = false;
  const cutBtn = document.getElementById('cutCakeBtn');
  const cakeWrapper = document.getElementById('cakeWrapper');

  function showSlicePresentation() {
    const overlay = document.createElement('div');
    overlay.className = 'slice-presentation';
    overlay.innerHTML = `
      <div class="slice-card">
        <i class="fas fa-gift"></i>
        <h3>🎂 A Slice of Love! 🎂</h3>
        <div class="slice-plate">
          <div class="slice">
            <i class="fas fa-female"></i>
            <p style="font-weight: bold; margin-top: 8px;">For Mom</p>
            <p style="font-size: 0.9rem;">❤️ Sweetness & Grace</p>
          </div>
          <div class="slice">
            <i class="fas fa-male"></i>
            <p style="font-weight: bold; margin-top: 8px;">For Dad</p>
            <p style="font-size: 0.9rem;">💪 Strength & Love</p>
          </div>
        </div>
        <p style="font-style: italic; margin: 10px 0;">A perfect piece for the perfect pair!</p>
        <div class="modal-buttons">
          <button class="modal-btn back-btn" id="backFromSliceBtn"><i class="fas fa-arrow-left"></i> Back to Celebration</button>
          <button class="modal-btn" id="closeSliceBtn">Enjoy Together 💕</button>

      </div>
    `;
    document.body.appendChild(overlay);
    triggerConfetti(80);
    playSweetSound();
    
    const closeBtn = overlay.querySelector('#closeSliceBtn');
    const backBtn = overlay.querySelector('#backFromSliceBtn');
    closeBtn.addEventListener('click', () => {
      overlay.remove();
      messageArea.innerHTML = "🍰 Mom & Dad shared the cake! Forever sweet memories! 🍰";
      setTimeout(() => {
        messageArea.innerHTML = "💖 Thank you for being the most wonderful parents! Happy Anniversary! 💖";

    });
    backBtn.addEventListener('click', () => {
      overlay.remove();
      messageArea.innerHTML = "💖 Come back anytime to celebrate! Love never ends! 💖";
    });
  }

  function cutCakeAction() {
    if(cakeCut) {
      messageArea.innerHTML = "🍰 Already shared the cake! But love never stops! 🍰";
      triggerConfetti(20);
      return;
    }
    cakeCut = true;
    
    // Cinematic slow knife animation
    const knife = document.createElement('div');
    knife.classList.add('knife-cinematic');
    knife.innerHTML = '🔪✨✨';
    cakeWrapper.style.position = 'relative';
    cakeWrapper.appendChild(knife);
    
    playSweetSound();
    messageArea.innerHTML = "💖🔪 Mom & Dad are cutting the cake with love! A beautiful moment! 🔪💖";
    triggerConfetti(30);
    
    // Slower animation timing - 1.2 seconds
    setTimeout(() => {
      knife.remove();
      const topLayer = document.querySelector('.cake-layer-top');
      const cutMark = document.createElement('div');
      cutMark.style.cssText = "position: absolute; right: 25px; top: 12px; width: 28px; height: 28px; background: #e6a157; border-radius: 50%; opacity: 0.8; box-shadow: 0 0 6px gold; animation: pulse 0.5s ease;";
      topLayer.style.position = 'relative';
      topLayer.appendChild(cutMark);
      setTimeout(() => cutMark.remove(), 1500);
      
      // Show slice presentation
      showSlicePresentation();
    }, 1200);
  }

  cutBtn.addEventListener('click', cutCakeAction);

  // Microphone Blow Detection
  let micActive = false;
  let audioContext = null;
  let mediaStream = null;
  let analyser = null;
  const micHintBtn = document.getElementById('micHint');

  async function enableMicrophone() {
    if(micActive) return;
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaStream = stream;
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioContext.createAnalyser();
      const source = audioContext.createMediaStreamSource(stream);
      source.connect(analyser);
      analyser.fftSize = 256;
      const bufferLength = analyser.frequencyBinCount;
      const dataArray = new Uint8Array(bufferLength);
      micActive = true;
      micHintBtn.innerHTML = '<i class="fas fa-microphone"></i> 🎤 Mic Active! Blow softly to blow candles!';
      function detectBlow() {
        if(!micActive || !analyser) return;
        analyser.getByteTimeDomainData(dataArray);
        let maxSample = 0;
        for(let i=0; i<bufferLength; i++) {
          let v = (dataArray[i] - 128) / 128;
          maxSample = Math.max(maxSample, Math.abs(v));
        }
        if(maxSample > 0.58 && candlesLit === true) {
          const centerX = window.innerWidth/2;
          const centerY = window.innerHeight/2;
          createBlowEffect(centerX, centerY);
          blowAllCandles();
        }
        requestAnimationFrame(detectBlow);
      }
      detectBlow();
    } catch(e) {
      micHintBtn.innerHTML = '<i class="fas fa-microphone-slash"></i> Mic permission needed — click candles to blow!';
    }
  }

  micHintBtn.addEventListener('click', enableMicrophone);
  document.getElementById('blowCandlesBtn').addEventListener('click', () => {
    if(candlesLit) blowAllCandles();
    else messageArea.innerHTML = "🕯️ Candles already blown! Make a wish come true! 🕯️";
  });

  // Games Implementation
  function showLoveMeter() {
    const modal = document.createElement('div');
    modal.className = 'game-modal';
    modal.innerHTML = `
      <div class="game-content">
        <i class="fas fa-heart" style="font-size: 3rem; color: #e6a157;"></i>
        <h3 style="color:#b45f2b;">Love Meter ❤️</h3>
        <div class="love-meter" id="loveMeterValue">∞</div>
        <p>Mom & Dad's love is <strong>INFINITE</strong> and beyond!</p>
        <button class="close-game" id="closeGameBtn">Back to Celebration</button>
      </div>
    `;
    document.body.appendChild(modal);
    const closeBtn = modal.querySelector('#closeGameBtn');
    closeBtn.addEventListener('click', () => modal.remove());
    triggerConfetti(25);
  }

  function showFortuneCookie() {
    const fortunes = [
      "💖 Your love grows stronger with every sunrise!",
      "🌸 Together you've built a beautiful legacy of love!",
      "✨ May your days be filled with laughter and sweet moments!",
      "💕 The bond you share is a treasure beyond measure!",
      "🌹 Every anniversary is a new chapter of your beautiful story!",
      "🎉 Love like yours inspires everyone around you!",
      "💫 Your journey together is nothing short of magical!"
    ];
    const randomFortune = fortunes[Math.floor(Math.random() * fortunes.length)];
    const modal = document.createElement('div');
    modal.className = 'game-modal';
    modal.innerHTML = `
      <div class="game-content">
        <i class="fas fa-cookie-bite" style="font-size: 3rem; color: #e6a157;"></i>
        <h3 style="color:#b45f2b;">🍪 Love Fortune Cookie 🥠</h3>
        <div class="fortune-text">"${randomFortune}"</div>
        <button class="close-game" id="closeGameBtn">Back to Celebration</button>
      </div>
    `;
    document.body.appendChild(modal);
    const closeBtn = modal.querySelector('#closeGameBtn');
    closeBtn.addEventListener('click', () => modal.remove());
    triggerConfetti(20);
    playSweetSound();
  }

  document.getElementById('loveMeterGame').addEventListener('click', showLoveMeter);
  document.getElementById('fortuneCookie').addEventListener('click', showFortuneCookie);

  // Floating Hearts
  function createHeartFloat() {
    const heartDiv = document.createElement('div');
    heartDiv.classList.add('heart-float');
    heartDiv.innerHTML = ['❤️','💖','💗','🌸','🌹','✨','💕','💘'][Math.floor(Math.random()*8)];
    heartDiv.style.left = Math.random() * 100 + '%';
    heartDiv.style.animationDuration = 6 + Math.random() * 11 + 's';
    heartDiv.style.fontSize = 1 + Math.random() * 1.8 + 'rem';
    document.getElementById('heartsContainer').appendChild(heartDiv);
    setTimeout(() => heartDiv.remove(), 13000);
  }
  setInterval(createHeartFloat, 500);
  
  createCandles();
  setTimeout(() => {
    if(!cakeCut && candlesLit) messageArea.innerHTML = "❤️ Tap candles, blow into mic, then cut the cake! ❤️";
  }, 4000);
</script>
